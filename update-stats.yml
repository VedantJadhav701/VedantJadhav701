name: Update GitHub Stats Daily

on:
  schedule:
    - cron: "0 2 * * *"      # every day at 2:00 AM UTC
  workflow_dispatch:          # run manually anytime from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: VedantJadhav701
        run: python scripts/generate_stats.py

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/stats.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: refresh GitHub stats [skip ci]" && git push
